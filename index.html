<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TESM — Terminal Equipment State Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header { padding: 16px 24px; border-bottom: 1px solid #1e2433; display: flex; align-items: center; justify-content: space-between; background: #0f1117; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: 0.08em; color: #fff; }
  .logo span { color: #3b82f6; }
  .last-updated { font-size: 12px; color: #64748b; }

  .status-bar { padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #1e2433; background: #0f1117; position: sticky; top: 53px; z-index: 9; }
  .status-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .status-btn.active, .status-btn:hover { filter: brightness(1.15); }
  .s-all     { background: #1e293b; color: #94a3b8; border-color: #334155; }
  .s-all.active { background: #334155; color: #e2e8f0; }
  .s-avail   { background: #052e16; color: #4ade80; border-color: #166534; }
  .s-avail.active { background: #166534; }
  .s-running { background: #0c1a3a; color: #60a5fa; border-color: #1d4ed8; }
  .s-running.active { background: #1d4ed8; }
  .s-emerg   { background: #3b1200; color: #fb923c; border-color: #9a3412; }
  .s-emerg.active { background: #9a3412; }
  .s-oos     { background: #1a1a1a; color: #94a3b8; border-color: #475569; }
  .s-oos.active { background: #475569; }
  .s-planned { background: #2e1065; color: #c084fc; border-color: #7e22ce; }
  .s-planned.active { background: #7e22ce; }
  .s-damaged { background: #3b0000; color: #f87171; border-color: #991b1b; }
  .s-damaged.active { background: #991b1b; }

  .type-bar { padding: 10px 24px; display: flex; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid #1e2433; background: #0f1117; }
  .type-btn { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; border: 1px solid #1e2433; cursor: pointer; transition: all 0.15s; color: #94a3b8; background: transparent; }
  .type-btn:hover { border-color: #334155; color: #e2e8f0; }
  .type-btn.active { background: #1e2433; border-color: #3b82f6; color: #60a5fa; }
  .type-count { font-size: 11px; margin-left: 4px; color: #64748b; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 20px 24px; }

  .card { background: #131720; border: 1px solid #1e2433; border-radius: 10px; padding: 12px 8px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.15s; position: relative; }
  .card:hover { border-color: #334155; background: #1a2030; }
  .card.hidden { display: none; }

  .card-icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
  .card-icon svg { width: 40px; height: 40px; }
  .card-name { font-size: 12px; font-weight: 500; color: #e2e8f0; text-align: center; letter-spacing: 0.02em; }
  .card-status { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; text-align: center; }

  .dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 8px; right: 8px; }

  .st-available  .dot { background: #4ade80; }
  .st-running    .dot { background: #60a5fa; }
  .st-emergency  .dot { background: #fb923c; box-shadow: 0 0 6px #fb923c88; }
  .st-outofservice .dot { background: #475569; }
  .st-planned    .dot { background: #c084fc; }
  .st-damaged    .dot { background: #f87171; }

  .st-available  .card-icon svg { stroke: #4ade80; }
  .st-running    .card-icon svg { stroke: #60a5fa; }
  .st-emergency  .card-icon svg { stroke: #fb923c; }
  .st-outofservice .card-icon svg { stroke: #475569; }
  .st-planned    .card-icon svg { stroke: #c084fc; }
  .st-damaged    .card-icon svg { stroke: #f87171; }

  .st-available  { border-color: #16653440; }
  .st-running    { border-color: #1d4ed840; }
  .st-emergency  { border-color: #9a341240; }
  .st-outofservice { border-color: #33415540; }
  .st-planned    { border-color: #7e22ce40; }
  .st-damaged    { border-color: #991b1b40; }

  .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #475569; font-size: 14px; }

  .count-badge { font-size: 12px; background: #1e2433; color: #64748b; padding: 2px 7px; border-radius: 10px; margin-left: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">TES<span>M</span></div>
  <div class="last-updated" id="updated">Loading...</div>
</header>

<div class="status-bar" id="statusBar"></div>
<div class="type-bar" id="typeBar"></div>

  {id:'ESL-18',type:'ESL',status:'Running'},{id:'ESL-19',type:'ESL',status:'Available'},{id:'ESL-20',type:'ESL',status:'Running'},{id:'ESL-21',type:'ESL',status:'Out Of Service'},

let activeStatus = 'All';
let activeType = 'All';

function statusKey(s) {
  return s.toLowerCase().replace(/\s+/g,'');
}

function render() {
  const statCounts = {};
  const typeCounts = {};
  const types = ['All', ...new Set(EQUIPMENT.map(e=>e.type))];

  EQUIPMENT.forEach(e => {
    statCounts[e.status] = (statCounts[e.status]||0)+1;
    typeCounts[e.type] = (typeCounts[e.type]||0)+1;
  });

  const statusBar = document.getElementById('statusBar');
  const allCount = EQUIPMENT.length;
  const statuses = ['All', ...Object.keys(STATUS_META)];
  statusBar.innerHTML = statuses.map(s => {
    const meta = STATUS_META[s];
    const count = s==='All' ? allCount : (statCounts[s]||0);
    const cls = s==='All' ? 's-all' : meta.btn;
    const label = s==='All' ? 'All' : meta.label;
    return `<button class="status-btn ${cls} ${activeStatus===s?'active':''}" onclick="filterStatus('${s}')">${label} <span class="count-badge">${count}</span></button>`;
  }).join('');

  const typeBar = document.getElementById('typeBar');
  typeBar.innerHTML = types.map(t => {
    const count = t==='All' ? allCount : (typeCounts[t]||0);
    return `<button class="type-btn ${activeType===t?'active':''}" onclick="filterType('${t}')">${t} <span class="type-count">${count}</span></button>`;
  }).join('');

  const grid = document.getElementById('grid');
  const filtered = EQUIPMENT.filter(e => {
    const stMatch = activeStatus==='All' || e.status===activeStatus;
    const tyMatch = activeType==='All' || e.type===activeType;
    return stMatch && tyMatch;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No equipment matches this filter.</div>';
    return;
  }

  grid.innerHTML = filtered.map(e => {
    const stMeta = STATUS_META[e.status] || STATUS_META['Out Of Service'];
    const icon = ICONS[e.type] || ICONS['TR'];
    return `<div class="card ${stMeta.cls}" title="${e.status}">
      <div class="dot"></div>
      <div class="card-icon">${icon}</div>
      <div class="card-name">${e.id}</div>
    </div>`;
  }).join('');

  document.getElementById('updated').textContent = 'Demo data — ' + new Date().toLocaleTimeString();
}

function filterStatus(s) { activeStatus = s; render(); }
function filterType(t) { activeType = t; render(); }

render();
</script>
</body>
</html>
