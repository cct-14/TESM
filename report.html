<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TESM 故障回報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;overflow:hidden}

/* HEADER */
.header{background:#161b22;border-bottom:1px solid #21262d;padding:14px 20px;display:flex;align-items:center;gap:12px;position:fixed;top:0;left:0;right:0;z-index:100}
.header-logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:.08em}
.header-logo span{color:#3b82f6}
.back-btn{font-size:14px;color:#3b82f6;cursor:pointer;padding:4px 0}
.step-counter{margin-left:auto;font-size:12px;color:#6b7280}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:53px;left:0;right:0;height:3px;background:#21262d;z-index:100}
.progress-fill{height:100%;background:#3b82f6;transition:width .4s ease}

/* STEPS CONTAINER */
.steps{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden}
.step{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:24px 24px 80px;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);opacity:0}
.step.active{transform:translateX(0);opacity:1}
.step.prev{transform:translateX(-100%);opacity:0}

/* STEP CONTENT */
.step-label{font-size:13px;color:#3b82f6;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.step-question{font-size:26px;font-weight:700;color:#fff;margin-bottom:32px;line-height:1.3}

/* KIND GRID */
.kind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kind-btn{padding:18px 8px;background:#161b22;border:1.5px solid #21262d;border-radius:14px;color:#94a3b8;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.kind-btn:active{transform:scale(.95)}
.kind-btn.selected{background:#0c1a3a;border-color:#3b82f6;color:#60a5fa}

/* STATUS LIST */
.status-list{display:flex;flex-direction:column;gap:10px}
.status-btn{padding:18px 20px;background:#161b22;border:1.5px solid #21262d;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all .15s}
.status-btn:active{transform:scale(.98)}
.status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.status-btn.selected{border-color:currentColor}
.s-av{color:#4ade80}.s-av .status-dot{background:#4ade80}.s-av.selected{background:#052e16}
.s-ru{color:#60a5fa}.s-ru .status-dot{background:#60a5fa}.s-ru.selected{background:#0c1a3a}
.s-em{color:#fb923c}.s-em .status-dot{background:#fb923c}.s-em.selected{background:#431407}
.s-oos{color:#94a3b8}.s-oos .status-dot{background:#94a3b8}.s-oos.selected{background:#1f2937}
.s-pl{color:#c084fc}.s-pl .status-dot{background:#c084fc}.s-pl.selected{background:#2e1065}
.s-dm{color:#f87171}.s-dm .status-dot{background:#f87171}.s-dm.selected{background:#450a0a}

/* TEXT INPUT */
.big-input{width:100%;background:#161b22;border:1.5px solid #21262d;border-radius:14px;padding:18px 20px;font-size:20px;color:#e2e8f0;outline:none;transition:border-color .15s;-webkit-appearance:none;font-family:inherit}
.big-input:focus{border-color:#3b82f6}
.big-input::placeholder{color:#374151}

textarea.big-input{resize:none;line-height:1.5;font-size:17px}

/* BOTTOM BUTTON */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:16px 24px;padding-bottom:calc(16px + env(safe-area-inset-bottom));background:linear-gradient(transparent, #0d1117 40%)}
.next-btn{width:100%;padding:18px;background:#3b82f6;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s}
.next-btn:active{transform:scale(.98);background:#2563eb}
.next-btn:disabled{background:#1c2128;color:#4b5563;cursor:not-allowed}
.skip-link{text-align:center;margin-top:12px;font-size:13px;color:#4b5563;cursor:pointer}

/* CONFIRM STEP */
.confirm-list{display:flex;flex-direction:column;gap:0;background:#161b22;border:1px solid #21262d;border-radius:14px;overflow:hidden;margin-bottom:16px}
.confirm-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #21262d}
.confirm-row:last-child{border-bottom:none}
.confirm-label{font-size:12px;color:#6b7280;min-width:80px}
.confirm-value{font-size:14px;color:#e2e8f0;font-weight:500}

/* SUCCESS */
.success-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 24px}
.success-icon{font-size:72px;margin-bottom:20px;animation:pop .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-size:24px;font-weight:700;color:#4ade80;margin-bottom:8px}
.success-sub{font-size:14px;color:#6b7280;margin-bottom:32px}
.reset-btn{padding:16px 40px;background:#21262d;color:#e2e8f0;border:1px solid #30363d;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}

/* ERROR */
.input-error{color:#f87171;font-size:13px;margin-top:8px;display:none}
.show-error .input-error{display:block}
.show-error .big-input{border-color:#f87171}
</style>
</head>
<body>

<div class="header">
  <div class="back-btn" onclick="goBack()">‹ 返回</div>
  <div class="header-logo">TES<span>M</span></div>
  <div class="step-counter" id="step-counter">1 / 5</div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress-fill" style="width:20%"></div>
</div>

<div class="steps" id="steps-container">

  <!-- STEP 1: 種類 -->
  <div class="step active" id="step-1">
    <div class="step-label">步驟 1</div>
    <div class="step-question">選擇設備種類</div>
    <div class="kind-grid" id="kind-grid"></div>
  </div>

  <!-- STEP 2: 編號 -->
  <div class="step" id="step-2">
    <div class="step-label">步驟 2</div>
    <div class="step-question">輸入設備編號</div>
    <div id="field-number">
      <input class="big-input" id="input-number" type="text" placeholder="例如：42" autocomplete="off" autocapitalize="characters" onkeydown="if(event.key==='Enter')nextStep()"/>
      <div class="input-error">請輸入設備編號</div>
    </div>
  </div>

  <!-- STEP 3: 狀態 -->
  <div class="step" id="step-3">
    <div class="step-label">步驟 3</div>
    <div class="step-question">目前設備狀態</div>
    <div class="status-list">
      <button class="status-btn s-av" onclick="selectStatus('Available',this)"><div class="status-dot"></div>Available</button>
      <button class="status-btn s-ru" onclick="selectStatus('Running',this)"><div class="status-dot"></div>Running</button>
      <button class="status-btn s-em" onclick="selectStatus('Emergency Maintenance',this)"><div class="status-dot"></div>Emergency Maintenance</button>
      <button class="status-btn s-oos" onclick="selectStatus('Out Of Service',this)"><div class="status-dot"></div>Out Of Service</button>
      <button class="status-btn s-pl" onclick="selectStatus('Planned Maintenance',this)"><div class="status-dot"></div>Planned Maintenance</button>
      <button class="status-btn s-dm" onclick="selectStatus('Damaged',this)"><div class="status-dot"></div>Damaged</button>
    </div>
  </div>

  <!-- STEP 4: Process -->
  <div class="step" id="step-4">
    <div class="step-label">步驟 4</div>
    <div class="step-question">故障描述</div>
    <textarea class="big-input" id="input-process" rows="4" placeholder="描述故障情況或處理過程...（選填）"></textarea>
    <div class="skip-link" onclick="nextStep()">略過此步驟</div>
  </div>

  <!-- STEP 5: Crew -->
  <div class="step" id="step-5">
    <div class="step-label">步驟 5</div>
    <div class="step-question">你是誰？</div>
    <div id="field-crew">
      <input class="big-input" id="input-crew" type="text" placeholder="輸入姓名" autocomplete="name" onkeydown="if(event.key==='Enter')nextStep()"/>
      <div class="input-error">請輸入回報人員姓名</div>
    </div>
  </div>

  <!-- STEP 6: 確認 -->
  <div class="step" id="step-6">
    <div class="step-label">確認送出</div>
    <div class="step-question">確認回報內容</div>
    <div class="confirm-list">
      <div class="confirm-row"><div class="confirm-label">設備種類</div><div class="confirm-value" id="confirm-kind">-</div></div>
      <div class="confirm-row"><div class="confirm-label">設備編號</div><div class="confirm-value" id="confirm-number">-</div></div>
      <div class="confirm-row"><div class="confirm-label">狀態</div><div class="confirm-value" id="confirm-status">-</div></div>
      <div class="confirm-row"><div class="confirm-label">故障描述</div><div class="confirm-value" id="confirm-process" style="color:#6b7280">-</div></div>
      <div class="confirm-row"><div class="confirm-label">回報人員</div><div class="confirm-value" id="confirm-crew">-</div></div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="next-btn" id="next-btn" onclick="nextStep()" disabled>下一步</button>
</div>

<!-- SUCCESS -->
<div class="success-wrap" id="success-wrap" style="display:none">
  <div class="success-icon">✅</div>
  <div class="success-title">回報成功！</div>
  <div class="success-sub" id="success-detail"></div>
  <button class="reset-btn" onclick="resetForm()">再填一筆</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbTaNroJX1M7lz1fZS6BiiUFUJEzc2wCKnKw9jFhjYVUQKN-J-bczpmFfpKOMMHV12/exec';
const KINDS = ['TR','RTG','CH','GC','FL','SL','ESL','SP','RS','PPG','ARMGC'];
const TOTAL_STEPS = 6;

let currentStep = 1;
let selectedKind = '';
let selectedStatus = '';

// 建立種類按鈕
document.getElementById('kind-grid').innerHTML = KINDS.map(k=>
  `<button class="kind-btn" onclick="selectKind('${k}',this)">${k}</button>`
).join('');

function updateProgress(){
  const pct = (currentStep / TOTAL_STEPS * 100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('step-counter').textContent = currentStep + ' / ' + TOTAL_STEPS;
}

function goToStep(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active','prev'));
  document.querySelectorAll('.step').forEach((s,i)=>{
    if(i+1 < n) s.classList.add('prev');
  });
  document.getElementById('step-'+n).classList.add('active');
  currentStep = n;
  updateProgress();
  updateNextBtn();

  // Auto focus input
  const input = document.getElementById('step-'+n)?.querySelector('input, textarea');
  if(input) setTimeout(()=>input.focus(), 350);
}

function goBack(){
  if(currentStep <= 1){ window.location.href='index.html'; return; }
  goToStep(currentStep - 1);
}

function nextStep(){
  if(!validateStep()) return;
  if(currentStep === TOTAL_STEPS){
    submitReport();
    return;
  }
  if(currentStep === TOTAL_STEPS - 1){
    // 填寫確認頁
    document.getElementById('confirm-kind').textContent = selectedKind;
    document.getElementById('confirm-number').textContent = selectedKind + '-' + document.getElementById('input-number').value.trim();
    document.getElementById('confirm-status').textContent = selectedStatus;
    document.getElementById('confirm-process').textContent = document.getElementById('input-process').value.trim() || '（無）';
    document.getElementById('confirm-crew').textContent = document.getElementById('input-crew').value.trim();
    document.getElementById('next-btn').textContent = '✓ 送出回報';
    document.getElementById('next-btn').style.background = '#16a34a';
  }
  goToStep(currentStep + 1);
}

function validateStep(){
  if(currentStep === 1) return !!selectedKind;
  if(currentStep === 2){
    const v = document.getElementById('input-number').value.trim();
    document.getElementById('field-number').classList.toggle('show-error', !v);
    return !!v;
  }
  if(currentStep === 3) return !!selectedStatus;
  if(currentStep === 5){
    const v = document.getElementById('input-crew').value.trim();
    document.getElementById('field-crew').classList.toggle('show-error', !v);
    return !!v;
  }
  return true;
}

function updateNextBtn(){
  const btn = document.getElementById('next-btn');
  btn.disabled = false;
  btn.style.background = '';
  if(currentStep === 1){ btn.disabled = !selectedKind; btn.textContent = '下一步'; }
  else if(currentStep === 2) btn.textContent = '下一步';
  else if(currentStep === 3){ btn.disabled = !selectedStatus; btn.textContent = '下一步'; }
  else if(currentStep === 4) btn.textContent = '下一步';
  else if(currentStep === 5) btn.textContent = '下一步';
  else if(currentStep === 6){ btn.textContent = '✓ 送出回報'; btn.style.background = '#16a34a'; }
}

function selectKind(kind, btn){
  selectedKind = kind;
  document.querySelectorAll('.kind-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  // 自動跳下一步
  setTimeout(()=>nextStep(), 200);
}

function selectStatus(status, btn){
  selectedStatus = status;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
  // 自動跳下一步
  setTimeout(()=>nextStep(), 200);
}

async function submitReport(){
  const number = selectedKind + '-' + document.getElementById('input-number').value.trim();
  const process = document.getElementById('input-process').value.trim();
  const crew = document.getElementById('input-crew').value.trim();

  const btn = document.getElementById('next-btn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  try {
    await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        machine_kind: selectedKind,
        number: number,
        status: selectedStatus,
        process: process,
        crew: crew
      })
    });

    document.getElementById('steps-container').style.display='none';
    document.querySelector('.bottom-bar').style.display='none';
    document.querySelector('.progress-bar').style.display='none';
    document.querySelector('.header').style.display='none';
    const sw = document.getElementById('success-wrap');
    sw.style.display='flex';
    document.getElementById('success-detail').textContent = `${number} — ${selectedStatus}\n回報人：${crew}`;

  } catch(err){
    btn.disabled = false;
    btn.textContent = '✓ 送出回報';
    btn.style.background = '#16a34a';
    alert('送出失敗，請檢查網路連線後再試');
  }
}

function resetForm(){
  selectedKind='';selectedStatus='';
  document.querySelectorAll('.kind-btn,.status-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('input-number').value='';
  document.getElementById('input-process').value='';
  document.getElementById('input-crew').value='';
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active','prev'));
  document.getElementById('steps-container').style.display='block';
  document.querySelector('.bottom-bar').style.display='block';
  document.querySelector('.progress-bar').style.display='block';
  document.querySelector('.header').style.display='flex';
  document.getElementById('success-wrap').style.display='none';
  document.getElementById('next-btn').textContent='下一步';
  document.getElementById('next-btn').style.background='';
  goToStep(1);
}

updateProgress();
updateNextBtn();
</script>
</body>
</html>
