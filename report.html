<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TESM 故障回報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;padding-bottom:40px}

/* HEADER */
.header{background:#161b22;border-bottom:1px solid #21262d;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:.08em}
.header-logo span{color:#3b82f6}
.header-title{font-size:14px;color:#8b949e}
.header-link{margin-left:auto;font-size:12px;color:#3b82f6;text-decoration:none}

/* FORM */
.form-wrap{padding:20px 16px;max-width:480px;margin:0 auto}

.field{margin-bottom:20px}
.field-label{font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.field-label .required{color:#f87171;margin-left:3px}

/* SELECT GRID */
.select-grid{display:grid;gap:8px}
.select-grid.col-3{grid-template-columns:repeat(3,1fr)}
.select-grid.col-2{grid-template-columns:repeat(2,1fr)}

.sel-btn{padding:14px 8px;background:#161b22;border:1.5px solid #21262d;border-radius:10px;color:#8b949e;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.sel-btn:active{transform:scale(.97)}
.sel-btn.selected{border-color:currentColor;background:#1c2128}

.sel-btn.kind-btn.selected{color:#60a5fa;border-color:#3b82f6;background:#0c1a3a}

.sel-btn.status-av{color:#4ade80}.sel-btn.status-av.selected{border-color:#4ade80;background:#052e16}
.sel-btn.status-ru{color:#60a5fa}.sel-btn.status-ru.selected{border-color:#60a5fa;background:#0c1a3a}
.sel-btn.status-em{color:#fb923c}.sel-btn.status-em.selected{border-color:#fb923c;background:#431407}
.sel-btn.status-oos{color:#94a3b8}.sel-btn.status-oos.selected{border-color:#94a3b8;background:#1f2937}
.sel-btn.status-pl{color:#c084fc}.sel-btn.status-pl.selected{border-color:#c084fc;background:#2e1065}
.sel-btn.status-dm{color:#f87171}.sel-btn.status-dm.selected{border-color:#f87171;background:#450a0a}

/* TEXT INPUT */
.text-input{width:100%;background:#161b22;border:1.5px solid #21262d;border-radius:10px;padding:14px 16px;font-size:16px;color:#e2e8f0;outline:none;transition:border-color .15s;-webkit-appearance:none}
.text-input:focus{border-color:#3b82f6}
.text-input::placeholder{color:#4b5563}

textarea.text-input{resize:none;line-height:1.5}

/* SUBMIT */
.submit-btn{width:100%;padding:18px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px}
.submit-btn:active{transform:scale(.98);background:#2563eb}
.submit-btn:disabled{background:#21262d;color:#4b5563;cursor:not-allowed}

/* SUCCESS */
.success-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:700;color:#4ade80;margin-bottom:8px}
.success-sub{font-size:14px;color:#6b7280;margin-bottom:32px}
.reset-btn{padding:14px 32px;background:#21262d;color:#e2e8f0;border:1px solid #30363d;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}

/* ERROR */
.error-msg{color:#f87171;font-size:12px;margin-top:6px;display:none}
.field.error .text-input{border-color:#f87171}
.field.error .error-msg{display:block}
.field.error .sel-btn{border-color:#f87171}

/* DIVIDER */
.divider{height:1px;background:#21262d;margin:24px 0}

/* LOADING */
.loading{display:none;align-items:center;justify-content:center;gap:10px;padding:16px;color:#6b7280;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #21262d;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">TES<span>M</span></div>
  <div class="header-title">故障回報</div>
  <a class="header-link" href="index.html">← 主控台</a>
</div>

<div class="form-wrap" id="form-wrap">

  <!-- Machine Kind -->
  <div class="field" id="field-kind">
    <label class="field-label">設備種類<span class="required">*</span></label>
    <div class="select-grid col-3" id="kind-grid"></div>
    <div class="error-msg">請選擇設備種類</div>
  </div>

  <!-- Number -->
  <div class="field" id="field-number">
    <label class="field-label">設備編號<span class="required">*</span></label>
    <input class="text-input" id="input-number" type="text" placeholder="例如：TR-42" autocomplete="off" autocapitalize="characters"/>
    <div class="error-msg">請輸入設備編號</div>
  </div>

  <div class="divider"></div>

  <!-- Status -->
  <div class="field" id="field-status">
    <label class="field-label">目前狀態<span class="required">*</span></label>
    <div class="select-grid col-2">
      <button class="sel-btn status-av" onclick="selectStatus('Available',this)">✅ Available</button>
      <button class="sel-btn status-ru" onclick="selectStatus('Running',this)">🔵 Running</button>
      <button class="sel-btn status-em" onclick="selectStatus('Emergency Maintenance',this)">🚨 Emergency</button>
      <button class="sel-btn status-oos" onclick="selectStatus('Out Of Service',this)">⛔ Out Of Service</button>
      <button class="sel-btn status-pl" onclick="selectStatus('Planned Maintenance',this)">🔧 Planned</button>
      <button class="sel-btn status-dm" onclick="selectStatus('Damaged',this)">💥 Damaged</button>
    </div>
    <div class="error-msg">請選擇設備狀態</div>
  </div>

  <div class="divider"></div>

  <!-- Process -->
  <div class="field">
    <label class="field-label">處理描述</label>
    <textarea class="text-input" id="input-process" rows="3" placeholder="描述故障情況或處理過程..."></textarea>
  </div>

  <!-- Crew -->
  <div class="field" id="field-crew">
    <label class="field-label">回報人員<span class="required">*</span></label>
    <input class="text-input" id="input-crew" type="text" placeholder="您的姓名" autocomplete="name"/>
    <div class="error-msg">請輸入回報人員姓名</div>
  </div>

  <!-- Submit -->
  <div class="loading" id="loading"><div class="spinner"></div>送出中...</div>
  <button class="submit-btn" id="submit-btn" onclick="submitReport()">送出回報</button>

</div>

<!-- Success Screen -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">回報成功！</div>
  <div class="success-sub" id="success-detail"></div>
  <button class="reset-btn" onclick="resetForm()">再填一筆</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbTaNroJX1M7lz1fZS6BiiUFUJEzc2wCKnKw9jFhjYVUQKN-J-bczpmFfpKOMMHV12/exec';

const KINDS = ['TR','RTG','CH','GC','FL','SL','ESL','SP','RS','PPG','ARMGC'];

let selectedKind = '';
let selectedStatus = '';

// 建立種類按鈕
document.getElementById('kind-grid').innerHTML = KINDS.map(k=>
  `<button class="sel-btn kind-btn" onclick="selectKind('${k}',this)">${k}</button>`
).join('');

function selectKind(kind, btn){
  selectedKind = kind;
  document.querySelectorAll('.kind-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('field-kind').classList.remove('error');
}

function selectStatus(status, btn){
  selectedStatus = status;
  document.querySelectorAll('[onclick^="selectStatus"]').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('field-status').classList.remove('error');
}

function validate(){
  let ok = true;
  if(!selectedKind){document.getElementById('field-kind').classList.add('error');ok=false;}
  if(!document.getElementById('input-number').value.trim()){document.getElementById('field-number').classList.add('error');ok=false;}
  else document.getElementById('field-number').classList.remove('error');
  if(!selectedStatus){document.getElementById('field-status').classList.add('error');ok=false;}
  if(!document.getElementById('input-crew').value.trim()){document.getElementById('field-crew').classList.add('error');ok=false;}
  else document.getElementById('field-crew').classList.remove('error');
  return ok;
}

async function submitReport(){
  if(!validate()) return;

  const number = document.getElementById('input-number').value.trim();
  const process = document.getElementById('input-process').value.trim();
  const crew = document.getElementById('input-crew').value.trim();

  document.getElementById('submit-btn').style.display='none';
  document.getElementById('loading').style.display='flex';

  try {
    await fetch(SCRIPT_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        machine_kind: selectedKind,
        number: number,
        status: selectedStatus,
        process: process,
        crew: crew
      })
    });

    // 成功
    document.getElementById('form-wrap').style.display='none';
    const screen = document.getElementById('success-screen');
    screen.style.display='flex';
    document.getElementById('success-detail').textContent=
      `${selectedKind} ${number} — ${selectedStatus}\n回報人：${crew}`;

  } catch(err){
    document.getElementById('submit-btn').style.display='block';
    document.getElementById('loading').style.display='none';
    alert('送出失敗，請檢查網路連線後再試');
  }
}

function resetForm(){
  selectedKind='';
  selectedStatus='';
  document.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('input-number').value='';
  document.getElementById('input-process').value='';
  document.getElementById('input-crew').value='';
  document.querySelectorAll('.field').forEach(f=>f.classList.remove('error'));
  document.getElementById('form-wrap').style.display='block';
  document.getElementById('success-screen').style.display='none';
  document.getElementById('submit-btn').style.display='block';
  document.getElementById('loading').style.display='none';
}

// 輸入時清除錯誤
document.getElementById('input-number').addEventListener('input',()=>document.getElementById('field-number').classList.remove('error'));
document.getElementById('input-crew').addEventListener('input',()=>document.getElementById('field-crew').classList.remove('error'));
</script>
</body>
</html>
